name: SATS Screener
on:
  schedule:
    - cron: '*/15 6-12 * * 0-4'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: pip install requests
      - name: Run
        run: python sats_screener.py
