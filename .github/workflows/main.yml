name: SATS Screener
on:
  schedule:
    - cron: '*/15 6-12 * * 0-4'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        run: sudo apt-get install -y python3 python3-pip
      - name: Install
        run: pip3 install requests
      - name: Run
        run: timeout 540 python3 sats_screener.py || true
